<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Scorebar Overlay</title>
<script src="vendor/ably.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Teko:wght@600&display=swap" rel="stylesheet" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    background: transparent !important;
    overflow: hidden;
  }

  body {
    display: flex;
    align-items: flex-end;
    justify-content: center;
    padding-bottom: 3%;
    min-height: 100vh;
  }

  .scorebar {
    display: flex;
    align-items: center;
    width: 75%;
    max-width: 960px;
    height: 48px;
    border-radius: 4px;
    overflow: hidden;
    font-family: 'Teko', sans-serif;
    box-shadow: 0 4px 24px rgba(0,0,0,0.7);
  }

  .team-block {
    flex: 1;
    height: 100%;
    background: rgba(15, 15, 35, 0.92);
    display: flex;
    align-items: center;
    padding: 0 16px;
  }
  .team-a-block { justify-content: flex-end; }
  .team-b-block { justify-content: flex-start; }

  .team-name {
    font-size: 28px;
    font-weight: 600;
    color: #ffffff;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    line-height: 1;
  }

  .score-center {
    display: flex;
    align-items: center;
    height: 100%;
    flex-shrink: 0;
  }

  .score-box {
    width: 48px;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 34px;
    font-weight: 600;
    color: #fff;
    line-height: 1;
    transition: background 0.3s;
  }

  .score-box.contrast-ring {
    box-shadow: inset 0 0 0 2px rgba(255,255,255,0.7);
  }

  .half-badge {
    height: 100%;
    padding: 0 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(25, 25, 50, 0.95);
    border-left: 1px solid rgba(255,255,255,0.08);
    border-right: 1px solid rgba(255,255,255,0.08);
    font-size: 15px;
    font-weight: 600;
    color: #b8bfd8;
    letter-spacing: 0.1em;
    font-family: sans-serif;
    text-transform: uppercase;
  }

  .score-flash {
    animation: flash 0.4s ease;
  }
  @keyframes flash {
    0%   { opacity: 1; transform: scale(1); }
    40%  { opacity: 0.6; transform: scale(1.2); }
    100% { opacity: 1; transform: scale(1); }
  }
</style>
</head>
<body>
<div class="scorebar">
  <div class="team-block team-a-block">
    <span class="team-name" id="nameA">LINCOLN</span>
  </div>
  <div class="score-center">
    <div class="score-box" id="scoreA" style="background:#c0392b;">0</div>
    <div class="half-badge" id="half">1H</div>
    <div class="score-box" id="scoreB" style="background:#1a5fa8;">0</div>
  </div>
  <div class="team-block team-b-block">
    <span class="team-name" id="nameB">AWAY</span>
  </div>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const urlChannel = params.get('channel');
  const urlAblyKey = params.get('ablyKey');
  if (urlChannel) localStorage.setItem('overlayChannel', urlChannel);
  if (urlAblyKey) localStorage.setItem('ablyKey', urlAblyKey);
  const CHANNEL = urlChannel || localStorage.getItem('overlayChannel') || 'scoreboard-overlay-v1';
  const ABLY_KEY = urlAblyKey || localStorage.getItem('ablyKey') || '';

  function applyState(state) {
    if (!state) return;
    if (state.nameA !== undefined) document.getElementById('nameA').textContent = state.nameA.toUpperCase();
    if (state.nameB !== undefined) document.getElementById('nameB').textContent = state.nameB.toUpperCase();
    if (state.colorA !== undefined) {
      const el = document.getElementById('scoreA');
      el.style.background = state.colorA;
      updateScoreContrast(el, state.colorA);
    }
    if (state.colorB !== undefined) {
      const el = document.getElementById('scoreB');
      el.style.background = state.colorB;
      updateScoreContrast(el, state.colorB);
    }
    if (state.scoreA !== undefined) {
      const el = document.getElementById('scoreA');
      el.textContent = state.scoreA;
      el.classList.remove('score-flash'); void el.offsetWidth; el.classList.add('score-flash');
    }
    if (state.scoreB !== undefined) {
      const el = document.getElementById('scoreB');
      el.textContent = state.scoreB;
      el.classList.remove('score-flash'); void el.offsetWidth; el.classList.add('score-flash');
    }
    if (state.half !== undefined) document.getElementById('half').textContent = state.half;
  }

  function parseColorToRgb(color) {
    if (!color) return null;
    const c = color.trim();

    // #rgb or #rrggbb
    if (c[0] === '#') {
      const hex = c.slice(1);
      if (hex.length === 3) {
        const r = parseInt(hex[0] + hex[0], 16);
        const g = parseInt(hex[1] + hex[1], 16);
        const b = parseInt(hex[2] + hex[2], 16);
        if (Number.isNaN(r) || Number.isNaN(g) || Number.isNaN(b)) return null;
        return { r, g, b };
      }
      if (hex.length === 6) {
        const r = parseInt(hex.slice(0, 2), 16);
        const g = parseInt(hex.slice(2, 4), 16);
        const b = parseInt(hex.slice(4, 6), 16);
        if (Number.isNaN(r) || Number.isNaN(g) || Number.isNaN(b)) return null;
        return { r, g, b };
      }
      return null;
    }

    // rgb(...) / rgba(...)
    const match = c.match(/rgba?\(([^)]+)\)/i);
    if (!match) return null;
    const parts = match[1].split(',').map(p => p.trim());
    if (parts.length < 3) return null;
    const r = parseInt(parts[0], 10);
    const g = parseInt(parts[1], 10);
    const b = parseInt(parts[2], 10);
    if (Number.isNaN(r) || Number.isNaN(g) || Number.isNaN(b)) return null;
    return { r, g, b };
  }

  function isDarkColor(color) {
    const rgb = parseColorToRgb(color);
    if (!rgb) return false;
    const luminance = (0.299 * rgb.r + 0.587 * rgb.g + 0.114 * rgb.b) / 255;
    return luminance < 0.42;
  }

  function updateScoreContrast(el, color) {
    if (isDarkColor(color)) el.classList.add('contrast-ring');
    else el.classList.remove('contrast-ring');
  }

  if (window.Ably && ABLY_KEY) {
    try {
      const ablyClient = new Ably.Realtime({ key: ABLY_KEY });
      const channel = ablyClient.channels.get(CHANNEL);
      channel.subscribe('update', msg => applyState(msg.data));
    } catch (e) {
      // Fall back to localStorage polling below.
    }
  }

  setInterval(() => {
    try {
      const s = localStorage.getItem('scoreState');
      if (s) applyState(JSON.parse(s));
    } catch(e) {}
  }, 500);

  // Apply contrast ring to initial inline score colors.
  updateScoreContrast(document.getElementById('scoreA'), document.getElementById('scoreA').style.background);
  updateScoreContrast(document.getElementById('scoreB'), document.getElementById('scoreB').style.background);
</script>
</body>
</html>
